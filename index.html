<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flipbook Aset Kripto - Interactive Edition</title>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/page-flip/dist/js/page-flip.browser.min.js"></script>

    <style>
        :root {
            --bg-color: #121212;
            --accent-color: #38bdf8;
        }

        body { 
            margin: 0; 
            background: var(--bg-color); 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            height: 100vh; 
            overflow: hidden; 
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        }

        /* Container Utama */
        #canvas-container {
            width: 95vw;
            height: 90vh;
            display: flex;
            justify-content: center;
            align-items: center;
            perspective: 2000px; /* Memberi efek kedalaman 3D */
        }

        #book-container { 
            visibility: hidden; 
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
        }

        /* Styling Tiap Halaman */
        .page-content { 
            background: white; 
            width: 100%; 
            height: 100%; 
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            box-shadow: inset 0 0 30px rgba(0,0,0,0.05);
        }

        canvas { 
            width: 100% !important; 
            height: auto !important; 
            max-height: 100%;
            display: block; 
        }

        /* Loading Screen */
        #loader { 
            position: fixed; 
            color: white; 
            text-align: center; 
            z-index: 100;
            background: var(--bg-color);
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }

        .spinner { 
            border: 4px solid rgba(255,255,255,0.1); 
            border-left-color: var(--accent-color); 
            border-radius: 50%; 
            width: 50px; 
            height: 50px; 
            animation: spin 1s linear infinite; 
            margin-bottom: 15px;
        }

        @keyframes spin { to { transform: rotate(360deg); } }

        #progress-wrapper {
            width: 200px;
            height: 4px;
            background: rgba(255,255,255,0.1);
            border-radius: 2px;
            margin-top: 10px;
            overflow: hidden;
        }

        #progress-bar {
            width: 0%;
            height: 100%;
            background: var(--accent-color);
            transition: width 0.3s;
        }
    </style>
</head>
<body>

    <div id="loader">
        <div class="spinner"></div>
        <p>Memuat Materi Kripto... <span id="percent">0%</span></p>
        <div id="progress-wrapper">
            <div id="progress-bar"></div>
        </div>
    </div>

    <div id="canvas-container">
        <div id="book-container">
            </div>
    </div>

    <script>
        const pdfPath = 'materi.pdf'; // Pastikan nama file ini sama di GitHub
        const container = document.getElementById('book-container');
        const percentText = document.getElementById('percent');
        const progressBar = document.getElementById('progress-bar');
        
        pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.worker.min.js';

        async function initFlipbook() {
            try {
                const loadingTask = pdfjsLib.getDocument(pdfPath);
                const pdf = await loadingTask.promise;
                const totalPages = pdf.numPages;

                for (let i = 1; i <= totalPages; i++) {
                    const page = await pdf.getPage(i);
                    // Scale 1.5 - 2.0 memberikan ketajaman yang baik di layar Desktop
                    const viewport = page.getViewport({ scale: 2 }); 
                    
                    const pageDiv = document.createElement('div');
                    pageDiv.className = 'page-content';
                    
                    const canvas = document.createElement('canvas');
                    const context = canvas.getContext('2d');
                    canvas.height = viewport.height;
                    canvas.width = viewport.width;

                    await page.render({ canvasContext: context, viewport: viewport }).promise;
                    pageDiv.appendChild(canvas);
                    container.appendChild(pageDiv);
                    
                    // Update progress loading
                    const progress = Math.round((i / totalPages) * 100);
                    percentText.innerText = `${progress}%`;
                    progressBar.style.width = `${progress}%`;
                }

                // Sembunyikan loader dan munculkan buku
                document.getElementById('loader').style.display = 'none';
                container.style.visibility = 'visible';

                // Inisialisasi efek PageFlip
                const pageFlip = new St.PageFlip(container, {
                    width: 600, // Lebar dasar halaman
                    height: 850, // Tinggi dasar halaman
                    size: "stretch",
                    minWidth: 315,
                    maxWidth: 1200,
                    minHeight: 420,
                    maxHeight: 1600,
                    maxShadowOpacity: 0.6, // Bayangan lebih pekat agar nyata
                    showCover: true,
                    usePortrait: true, // Auto switch 1 halaman (mobile) / 2 halaman (desktop)
                    flippingTime: 1000,
                    swipeDistance: 30,
                    clickEventForward: true,
                    useMouseEvents: true
                });

                pageFlip.loadFromHTML(document.querySelectorAll(".page-content"));

            } catch (error) {
                console.error(error);
                percentText.innerText = "Error: File PDF tidak ditemukan.";
            }
        }

        initFlipbook();
    </script>
</body>
</html>
