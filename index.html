<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flipbook Aset Kripto - Full Screen Optimized</title>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/page-flip/dist/js/page-flip.browser.min.js"></script>

    <style>
        * {
            box-sizing: border-box;
        }

        body { 
            margin: 0; 
            background: #121212; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            height: 100vh; 
            width: 100vw;
            overflow: hidden;
            /* Memberikan space 5% dari tinggi layar di atas dan bawah */
            padding: 5vh 0; 
        }

        #canvas-container {
            width: 95%;      
            height: 90vh; /* Menggunakan 90% tinggi layar agar terlihat besar */
            display: flex;
            justify-content: center;
            align-items: center;
            perspective: 2000px;
        }

        #book-container { 
            visibility: hidden; 
            box-shadow: 0 25px 60px rgba(0,0,0,0.8);
        }

        .page-content { 
            background: white; 
            width: 100%; 
            height: 100%; 
            overflow: hidden;
        }

        canvas { 
            width: 100% !important; 
            height: 100% !important; 
            display: block; 
            object-fit: contain;
        }

        #loader { 
            position: fixed; 
            color: white; 
            z-index: 100;
            background: #121212;
            inset: 0;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }

        .spinner { 
            border: 4px solid rgba(255,255,255,0.1); 
            border-left-color: #38bdf8; 
            border-radius: 50%; 
            width: 40px; 
            height: 40px; 
            animation: spin 1s linear infinite; 
            margin-bottom: 10px;
        }

        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>

    <div id="loader">
        <div class="spinner"></div>
        <p>Memuat Materi... <span id="percent">0%</span></p>
    </div>

    <div id="canvas-container">
        <div id="book-container"></div>
    </div>

    <script>
        const pdfPath = 'materi.pdf'; 
        const container = document.getElementById('book-container');
        const percentText = document.getElementById('percent');
        
        pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.worker.min.js';

        async function initFlipbook() {
            try {
                const loadingTask = pdfjsLib.getDocument(pdfPath);
                const pdf = await loadingTask.promise;
                const totalPages = pdf.numPages;

                for (let i = 1; i <= totalPages; i++) {
                    const page = await pdf.getPage(i);
                    const viewport = page.getViewport({ scale: 2.0 }); 
                    
                    const pageDiv = document.createElement('div');
                    pageDiv.className = 'page-content';
                    
                    const canvas = document.createElement('canvas');
                    const context = canvas.getContext('2d');
                    canvas.height = viewport.height;
                    canvas.width = viewport.width;

                    await page.render({ canvasContext: context, viewport: viewport }).promise;
                    pageDiv.appendChild(canvas);
                    container.appendChild(pageDiv);
                    
                    percentText.innerText = `${Math.round((i / totalPages) * 100)}%`;
                }

                document.getElementById('loader').style.display = 'none';
                container.style.visibility = 'visible';

                const pageFlip = new St.PageFlip(container, {
                    width: 500, 
                    height: 700, 
                    size: "stretch", 
                    minWidth: 300,
                    maxWidth: 1800,
                    minHeight: 400,
                    maxHeight: 2500,
                    maxShadowOpacity: 0.5,
                    showCover: true,
                    usePortrait: false, // Menampilkan 2 halaman di layar lebar agar mantap
                    flippingTime: 1000,
                    drawShadow: true
                });

                pageFlip.loadFromHTML(document.querySelectorAll(".page-content"));

            } catch (error) {
                percentText.innerText = "Gagal memuat PDF.";
            }
        }

        initFlipbook();
    </script>
</body>
</html>
