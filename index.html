<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flipbook Aset Kripto - Responsive</title>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/page-flip/dist/js/page-flip.browser.min.js"></script>

    <style>
        body { 
            margin: 0; 
            background: #121212; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            height: 100vh; 
            width: 100vw;
            overflow: hidden; 
        }

        /* Container utama menggunakan persen agar fleksibel */
        #canvas-container {
            width: 90%;  /* Mengambil 90% lebar layar */
            height: 85%; /* Mengambil 85% tinggi layar */
            display: flex;
            justify-content: center;
            align-items: center;
        }

        #book-container { 
            visibility: hidden; 
        }

        .page-content { 
            background: white; 
            width: 100%; 
            height: 100%; 
            box-shadow: inset 0 0 20px rgba(0,0,0,0.1);
        }

        canvas { 
            width: 100% !important; 
            height: 100% !important; 
            display: block; 
            object-fit: contain; /* Memastikan konten PDF tetap proporsional */
        }

        #loader { 
            position: fixed; 
            color: white; 
            text-align: center; 
            z-index: 100;
        }
    </style>
</head>
<body>

    <div id="loader">
        <p>Menyiapkan Flipbook... <span id="percent">0%</span></p>
    </div>

    <div id="canvas-container">
        <div id="book-container"></div>
    </div>

    <script>
        const pdfPath = 'materi.pdf';
        const container = document.getElementById('book-container');
        const percentText = document.getElementById('percent');
        
        pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.worker.min.js';

        async function initFlipbook() {
            try {
                const loadingTask = pdfjsLib.getDocument(pdfPath);
                const pdf = await loadingTask.promise;
                const totalPages = pdf.numPages;

                for (let i = 1; i <= totalPages; i++) {
                    const page = await pdf.getPage(i);
                    const viewport = page.getViewport({ scale: 1.5 }); 
                    
                    const pageDiv = document.createElement('div');
                    pageDiv.className = 'page-content';
                    
                    const canvas = document.createElement('canvas');
                    const context = canvas.getContext('2d');
                    canvas.height = viewport.height;
                    canvas.width = viewport.width;

                    await page.render({ canvasContext: context, viewport: viewport }).promise;
                    pageDiv.appendChild(canvas);
                    container.appendChild(pageDiv);
                    
                    percentText.innerText = `${Math.round((i / totalPages) * 100)}%`;
                }

                document.getElementById('loader').style.display = 'none';
                container.style.visibility = 'visible';

                // Pengaturan ukuran fleksibel
                const pageFlip = new St.PageFlip(container, {
                    width: 400, // Rasio lebar
                    height: 550, // Rasio tinggi
                    size: "stretch", // Kunci agar mengikuti ukuran container (%)
                    minWidth: 200,
                    maxWidth: 2000,
                    minHeight: 300,
                    maxHeight: 2000,
                    maxShadowOpacity: 0.5,
                    showCover: true,
                    usePortrait: true,
                    flippingTime: 800
                });

                pageFlip.loadFromHTML(document.querySelectorAll(".page-content"));

            } catch (error) {
                percentText.innerText = "Gagal memuat PDF.";
            }
        }

        initFlipbook();
    </script>
</body>
</html>
